name: k6 Performance

on:
  # Only re-run when the perf suite itself changes — not on every content push.
  # Performance of a static CDN site doesn't change with a copy edit, so
  # hammering it on every commit would be noise, not signal.
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/k6.yml'
  workflow_dispatch:          # run on demand, anytime
  schedule:
    - cron: '15 7 * * 1'      # weekly, Monday 07:15 UTC — enough for a CDN-backed site

permissions:
  contents: write

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 performance smoke
        run: k6 run scripts/smoke.js

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: |
            summary.txt
            status.json
          if-no-files-found: ignore

      - name: Publish status.json (rebase + retry)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json summary.txt 2>/dev/null || true
          git commit -m "chore: update k6 status [skip ci]" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            sleep $(( (RANDOM % 5) + 2 ))
          done
          echo "push failed after retries" && exit 1
